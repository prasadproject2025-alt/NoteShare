<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NoteShare - Firebase Auth Debug</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>body{font-family:Arial;padding:20px}label{display:block;margin-top:10px}</style>
</head>
<body>
  <h3>Firebase Auth Debug</h3>
  <p>Enter credentials to test signInWithEmailAndPassword and view error details.</p>
  <label>Email: <input id="email" type="email" value="test@vitstudent.ac.in" style="width:320px"></label>
  <label>Password: <input id="password" type="password" value="password123" style="width:320px"></label>
  <button id="test">Test Login</button>
  <pre id="out" style="background:#f7f7f7;padding:10px;margin-top:12px;white-space:pre-wrap"></pre>

  <script>
    document.getElementById('test').addEventListener('click', async function() {
      const out = document.getElementById('out');
      out.textContent = 'Initializing Firebase...';
      try {
        if (!firebase || !firebase.auth) throw new Error('Firebase SDK not loaded');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        out.textContent = 'Signing in ' + email + '...';
        try {
          const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
          out.textContent = 'Sign-in success:\n' + JSON.stringify({ uid: cred.user.uid, email: cred.user.email }, null, 2);
        } catch (err) {
          out.textContent = 'Sign-in error:\n' + (err && err.code ? err.code + ' - ' + err.message : String(err));
          console.error('Sign-in error', err);
        }
      } catch (e) {
        out.textContent = 'Initialization error: ' + e.message;
      }
    });
  </script>
</body>
</html>
