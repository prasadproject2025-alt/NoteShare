<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteShare - VIT Note Sharing Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/nav.js" defer></script>
</head>
<body>
<div id="app-header"></div>
<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-shield-alt me-2"></i>Admin Login</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i></div>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-danger w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login as Admin
                        </button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="index.html" class="btn btn-link">Back to Home</a>
            </div>
        </div>
    </div>
</main>
<div id="app-footer"></div>
<script src="js/admin-login.js" defer></script>
</body>
</html>
