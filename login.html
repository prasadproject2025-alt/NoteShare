<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NoteShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/nav.js" defer></script>
    <script src="js/login-page.js" defer></script>
</head>
<body>
<div id="app-header"></div>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white"><h3>Welcome to NoteShare</h3></div>
                <div class="card-body">
                    <form id="login-form" onsubmit="event.preventDefault(); loginUser();">
                        <div class="mb-3">
                            <label for="login-email" class="form-label">VIT Student Gmail</label>
                            <input type="email" class="form-control" id="login-email" placeholder="your.email@vitstudent.ac.in" required>
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="login-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <a href="create-account.html" class="btn btn-success btn-lg">Create Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="app-footer"></div>
</body>
</html>
