<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteShare - VIT Note Sharing Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/nav.js" defer></script>
</head>
<body>
<div id="app-header"></div>
<main class="container mt-5">
    <div class="row" style="height: 75vh;">
        <div class="col-md-8">
            <div class="card h-100 d-flex flex-column">
                <div class="card-header">
                    <h5 id="chat-header">Messages</h5>
                </div>
                <div class="card-body flex-grow-1 overflow-auto" id="messages-container">
                    <p class="text-muted text-center">Loading messages...</p>
                    <p class="text-muted text-center">Select a conversation or start a new one</p>
                    </div>
                <div class="card-footer">
                    <form id="message-form" class="input-group">
                        <input type="text" class="form-control" id="message-input" placeholder="Type your message..." 
                               >
                        <button class="btn btn-primary" type="submit" >
                            Send
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 d-flex flex-column">
                <div class="card-header">
                    <h5>Conversations</h5>
                </div>
                <div class="card-body flex-grow-1 overflow-auto" id="conversations-list">
                    <p class="text-muted">Loading conversations...</p>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Firebase SDK -->


<script>
let userId = '';
let userName = '';
const chatId = new URLSearchParams(window.location.search).get('chat_id') || '';
let currentChatId = chatId;
let messagesBaseline = Date.now();

document.addEventListener('DOMContentLoaded', function() {
    // Wait for NoteShare app to be ready
    if (window.NoteShareBoot && typeof window.NoteShareBoot.waitForApp === 'function') {
        window.NoteShareBoot.waitForApp().then(() => {
            console.log('NoteShare app ready, initializing messages page...');

            // Initialize auth-backed globals
            if (window.NoteShareAuth) {
                userId = window.NoteShareAuth.getUserId() || '';
                userName = window.NoteShareAuth.getUserName() || '';
                window.userId = userId; // keep global sync
            }

            // Request notification permission once app is ready
            requestNotificationPermission();

            // Start listening for incoming messages (only new ones after page load)
            messagesBaseline = Date.now();
            attachGlobalMessageListener(messagesBaseline);

            // Load UI
            loadConversations();
            if (chatId) {
                loadMessages(chatId);
            }
        }).catch(error => {
            console.error('Failed to initialize:', error);
            document.getElementById('messages-container').innerHTML = '<div class="alert alert-danger">Error loading messages. Please refresh.</div>';
        });
    } else {
        // Fallback: attempt to use NoteShareAuth if already available
        if (window.NoteShareAuth) {
            userId = window.NoteShareAuth.getUserId() || '';
            userName = window.NoteShareAuth.getUserName() || '';
        }
        requestNotificationPermission();
        messagesBaseline = Date.now();
        attachGlobalMessageListener(messagesBaseline);
        loadConversations();
        if (chatId) {
            loadMessages(chatId);
        }
    }
});

// Request Notification permission from the user
function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
        try {
            Notification.requestPermission().then(function (permission) {
                console.log('Notification permission:', permission);
            });
        } catch (e) {
            console.warn('Notification request failed:', e);
        }
    }
}

function showMessageNotification(title, body, chatId) {
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
        const n = new Notification(title, {
            body: body,
            tag: 'noteshare-message-' + chatId,
            data: { chatId }
        });
        n.onclick = function () {
            window.focus();
            if (chatId) window.location.href = 'messages.html?chat_id=' + chatId;
            this.close();
        };
    } catch (e) {
        console.warn('Failed to show notification:', e);
    }
}

// Attach a global listener for new messages arriving after `baselineTs`.
function attachGlobalMessageListener(baselineTs) {
    try {
        const ref = firebase.database().ref('messages').orderByChild('timestamp').startAt(baselineTs + 1);
        ref.on('child_added', async function (snap) {
            const msg = snap.val();
            if (!msg) return;
            // Ignore messages sent by ourselves
            if (msg.sender_id === userId) return;

            // Ensure the chat exists and that the current user is a participant
            try {
                const chatSnap = await firebase.database().ref('chats/' + msg.chat_id).once('value');
                const chat = chatSnap.val();
                if (!chat) return;
                const participants = [chat.user1_id, chat.user2_id, chat.buyer_id, chat.seller_id].filter(Boolean);
                if (!participants.includes(userId)) return; // not for this user

                // Update conversations UI badge/list
                try { loadConversations(); } catch (e) { /* ignore */ }

                // If message is not for currently open chat, show a notification
                if (msg.chat_id !== currentChatId) {
                    const title = msg.sender_name || 'New message';
                    const body = (msg.text && msg.text.length > 120) ? msg.text.slice(0, 117) + '...' : (msg.text || 'You have a new message');
                    showMessageNotification(title, body, msg.chat_id);
                }
            } catch (err) {
                console.error('Global message handler error:', err);
            }
        });
    } catch (e) {
        console.warn('Could not attach global message listener:', e);
    }
}

function loadConversations() {
    firebase.database().ref('chats').orderByChild('created_at').once('value').then(snapshot => {
        const conversations = [];
        snapshot.forEach(childSnapshot => {
            const chat = childSnapshot.val();
            const chatKey = childSnapshot.key;
            
            // Check if current user is part of this chat
            if ((chat.buyer_id === userId || chat.seller_id === userId) ||
                (chat.user1_id === userId || chat.user2_id === userId)) {
                chat.id = chatKey;
                conversations.push(chat);
            }
        });

        const convoDiv = document.getElementById('conversations-list');
        if (conversations.length === 0) {
            convoDiv.innerHTML = '<p class="text-muted">No conversations yet</p>';
            return;
        }

        let html = '';
        conversations.forEach(conv => {
            const otherUserId = conv.buyer_id === userId ? conv.seller_id : 
                                (conv.seller_id === userId ? conv.buyer_id :
                                 (conv.user1_id === userId ? conv.user2_id : conv.user1_id));
            
            const isActive = conv.id === currentChatId;
            
            html += `
                <div class="conversation-item p-2 border-bottom cursor-pointer ${isActive ? 'bg-light' : ''}" 
                     onclick="selectConversation('${conv.id}')" style="cursor: pointer;">
                    <p class="mb-1 font-weight-bold">${conv.subject || 'Conversation'}</p>
                    <small class="text-muted">${conv.last_message || 'No messages yet'}</small><br>
                    <small class="text-muted">${new Date(conv.last_message_time).toLocaleDateString()}</small>
                </div>
            `;
        });
        convoDiv.innerHTML = html;
    });
}

function selectConversation(chatId) {
    currentChatId = chatId;
    window.location.href = 'messages.html?chat_id=' + chatId;
}

function loadMessages(chatId) {
    firebase.database().ref('chats/' + chatId).once('value').then(snapshot => {
        const chat = snapshot.val();
        if (!chat) {
            alert('Chat not found');
            return;
        }

        // Update header with other user info
        const header = document.getElementById('chat-header');
        const otherUserId = chat.buyer_id === userId ? chat.seller_id : 
                            (chat.seller_id === userId ? chat.buyer_id :
                             (chat.user1_id === userId ? chat.user2_id : chat.user1_id));
        
        header.textContent = chat.subject || 'Chat';

        // Load chat messages
        firebase.database().ref('messages').orderByChild('chat_id').equalTo(chatId)
            .once('value').then(snapshot => {
                const container = document.getElementById('messages-container');
                const messages = [];

                snapshot.forEach(childSnapshot => {
                    messages.push(childSnapshot.val());
                });

                if (messages.length === 0) {
                    container.innerHTML = '<p class="text-muted text-center">No messages yet. Start the conversation!</p>';
                    return;
                }

                let html = '';
                messages.forEach(msg => {
                    const isSender = msg.sender_id === userId;
                    const timestamp = new Date(msg.timestamp).toLocaleTimeString();
                    
                    html += `
                        <div class="mb-3 ${isSender ? 'text-end' : 'text-start'}">
                            <div class="d-inline-block p-2 rounded ${isSender ? 'bg-primary text-white' : 'bg-light'}">
                                <p class="mb-1">${msg.text}</p>
                                <small class="${isSender ? 'text-light' : 'text-muted'}">${timestamp}</small>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                
                // Scroll to bottom
                container.scrollTop = container.scrollHeight;

                // Set up real-time listener for new messages
                firebase.database().ref('messages').orderByChild('chat_id').equalTo(chatId)
                    .on('child_added', (snapshot) => {
                        const msg = snapshot.val();
                        if (!messages.find(m => m.text === msg.text && m.timestamp === msg.timestamp)) {
                            loadMessages(chatId);
                        }
                    });
            });
    });
}

document.getElementById('message-form').addEventListener('submit', function(e) {
    e.preventDefault();
    sendMessage();
});

function sendMessage() {
    if (!currentChatId) {
        alert('Please select a conversation first');
        return;
    }

    const messageText = document.getElementById('message-input').value.trim();
    if (!messageText) {
        return;
    }

    firebase.database().ref('messages').push({
        chat_id: currentChatId,
        sender_id: userId,
        sender_name: userName,
        text: messageText,
        timestamp: Date.now()
    }).then(() => {
        document.getElementById('message-input').value = '';
        
        // Update chat's last message
        firebase.database().ref('chats/' + currentChatId).update({
            last_message: messageText,
            last_message_time: Date.now()
        });

        loadMessages(currentChatId);
        loadConversations();
    }).catch(error => {
        alert('Error sending message: ' + error.message);
    });
}
</script>
<div id="app-footer">
</body>
</html>
