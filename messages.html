<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteShare - VIT Note Sharing Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/nav.js" defer></script>
</head>
<body>
<div id="app-header"></div>
<main class="container py-4">
    <div class="chat-shell">
        <aside class="chat-sidebar">
            <div class="chat-sidebar-header">
                <h5 class="mb-0">Chats</h5>
                <small class="text-muted">Discuss price and note details</small>
            </div>
            <div class="chat-sidebar-list" id="conversations-list">
                <p class="text-muted">Loading conversations...</p>
            </div>
        </aside>

        <section class="chat-main">
            <div class="chat-header">
                <div class="d-flex align-items-center justify-content-between gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="conversation-avatar" id="chat-avatar">N</div>
                        <div>
                            <h5 class="mb-0" id="chat-header">Select a chat</h5>
                            <small class="text-muted" id="chat-subtitle">Negotiate price and note content</small>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="btn btn-outline-primary btn-sm" type="button" onclick="viewNoteAd()">View Note Ad</button>
                        <button class="btn btn-outline-danger btn-sm" type="button" onclick="deleteCurrentChat()">Delete</button>
                    </div>
                </div>
            </div>

            <div class="chat-body" id="messages-container">
                <div class="chat-empty-state">
                    <p class="text-muted">Choose a conversation to see the note discussion thread.</p>
                </div>
            </div>

            <div id="chat-note-card"></div>
            <div class="quick-actions" id="quick-actions"></div>

            <form id="message-form" class="chat-footer">
                <input type="text" class="form-control chat-input" id="message-input" placeholder="Type your message about the price or content...">
                <button class="btn btn-primary" type="submit">Send</button>
            </form>
        </section>
    </div>
</main>

<script>
let userId = '';
let userName = '';
const chatId = new URLSearchParams(window.location.search).get('chat_id') || '';
let currentChatId = chatId;
let messagesBaseline = Date.now();
let currentChatData = null;

function getCurrentUserId() {
    if (userId) return userId;
    if (window.NoteShareAuth && typeof window.NoteShareAuth.getUserId === 'function') {
        userId = window.NoteShareAuth.getUserId() || '';
    }
    if (!userId && window.userId) {
        userId = window.userId;
    }
    if (!userId) {
        try {
            const session = JSON.parse(localStorage.getItem('noteshare_session') || 'null');
            userId = session?.user_id || '';
        } catch (e) {
            userId = '';
        }
    }
    return userId;
}

function initMessagesPage() {
    if (window.NoteShareAuth) {
        userId = window.NoteShareAuth.getUserId() || '';
        userName = window.NoteShareAuth.getUserName() || '';
        window.userId = userId;
    }
    getCurrentUserId();
    updateNotificationBadge();

    requestNotificationPermission();
    messagesBaseline = Date.now();
    attachGlobalMessageListener(messagesBaseline);
    loadConversations();
    if (currentChatId) {
        loadMessages(currentChatId);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    if (window.NoteShareBoot && typeof window.NoteShareBoot.waitForApp === 'function') {
        window.NoteShareBoot.waitForApp().then(() => {
            console.log('NoteShare app ready, initializing messages page...');
            initMessagesPage();
        }).catch(error => {
            console.error('Failed to initialize:', error);
            document.getElementById('messages-container').innerHTML = '<div class="alert alert-danger">Error loading messages. Please refresh.</div>';
        });
    } else {
        initMessagesPage();
    }
});

function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
        try {
            Notification.requestPermission().then(function(permission) {
                console.log('Notification permission:', permission);
            });
        } catch (e) {
            console.warn('Notification request failed:', e);
        }
    }
}

function showMessageNotification(title, body, chatId) {
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
        const n = new Notification(title, {
            body: body,
            tag: 'noteshare-message-' + chatId,
            data: { chatId }
        });
        n.onclick = function() {
            window.focus();
            if (chatId) window.location.href = 'messages.html?chat_id=' + chatId;
            this.close();
        };
    } catch (e) {
        console.warn('Failed to show notification:', e);
    }
}

function escapeHtml(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function getOtherUserName(chat) {
    if (!chat) return '';
    const activeUserId = getCurrentUserId();
    if (chat.buyer_id === activeUserId) return chat.seller_name || chat.seller_id || '';
    if (chat.seller_id === activeUserId) return chat.buyer_name || chat.buyer_id || '';
    if (chat.user1_id === activeUserId) return chat.user2_name || chat.user2_id || '';
    if (chat.user2_id === activeUserId) return chat.user1_name || chat.user1_id || '';
    return '';
}

async function getProfileName(userIdToLookup) {
    if (!userIdToLookup) return '';
    try {
        const snap = await firebase.database().ref('users/' + userIdToLookup).once('value');
        const data = snap.val() || {};
        return data.name || data.user_name || data.displayName || '';
    } catch (e) {
        return '';
    }
}

async function getChatDisplayName(chat) {
    const otherName = getOtherUserName(chat);
    if (otherName) return otherName;

    const otherUserId = getOtherUserId(chat);
    if (otherUserId) {
        const profileName = await getProfileName(otherUserId);
        if (profileName) return profileName;
    }

    if (chat?.subject) return chat.subject;
    if (chat?.note_title) return chat.note_title;
    return 'Note discussion';
}

function getOtherUserId(chat) {
    if (!chat) return '';
    const activeUserId = getCurrentUserId();
    if (chat.buyer_id === activeUserId) return chat.seller_id || '';
    if (chat.seller_id === activeUserId) return chat.buyer_id || '';
    if (chat.user1_id === activeUserId) return chat.user2_id || '';
    if (chat.user2_id === activeUserId) return chat.user1_id || '';
    return '';
}

function attachGlobalMessageListener(baselineTs) {
    try {
        const ref = firebase.database().ref('messages').orderByChild('timestamp').startAt(baselineTs + 1);
        ref.on('child_added', async function(snap) {
            const msg = snap.val();
            if (!msg || msg.sender_id === getCurrentUserId()) return;

            try {
                const chatSnap = await firebase.database().ref('chats/' + msg.chat_id).once('value');
                const chat = chatSnap.val();
                if (!chat) return;
                const participants = [chat.user1_id, chat.user2_id, chat.buyer_id, chat.seller_id].filter(Boolean);
                if (!participants.includes(getCurrentUserId())) return;

                loadConversations();
                if (msg.chat_id === currentChatId) {
                    loadMessages(msg.chat_id);
                } else {
                    const chatRef = firebase.database().ref('chats/' + msg.chat_id);
                    const unreadCount = (chat.unread_count || 0) + 1;
                    chatRef.update({ unread_count: unreadCount, last_message_sender_id: msg.sender_id });
                    const title = msg.sender_name || 'New message';
                    const body = (msg.text && msg.text.length > 120) ? msg.text.slice(0, 117) + '...' : (msg.text || 'You have a new message');
                    showMessageNotification(title, body, msg.chat_id);
                }
            } catch (err) {
                console.error('Global message handler error:', err);
            }
        });
    } catch (e) {
        console.warn('Could not attach global message listener:', e);
    }
}

async function markMessagesAsViewed(chatId) {
    if (!chatId || !getCurrentUserId()) return;

    try {
        const messagesRef = firebase.database().ref('messages');
        const snapshot = await messagesRef.orderByChild('chat_id').equalTo(chatId).once('value');
        const updates = [];

        snapshot.forEach(child => {
            const msg = child.val() || {};
            if (msg.sender_id && msg.sender_id !== getCurrentUserId() && msg.viewed !== true) {
                updates.push(messagesRef.child(child.key).update({ viewed: true }));
            }
        });

        if (updates.length) {
            await Promise.all(updates);
        }

        await firebase.database().ref('chats/' + chatId).update({ unread_count: 0 });
    } catch (err) {
        console.warn('Could not mark messages as viewed:', err);
    }
}

async function loadConversations() {
    firebase.database().ref('chats').orderByChild('created_at').once('value').then(async snapshot => {
        const conversations = [];
        snapshot.forEach(childSnapshot => {
            const chat = childSnapshot.val();
            const chatKey = childSnapshot.key;
            const activeUserId = getCurrentUserId();
            if ((chat.buyer_id === activeUserId || chat.seller_id === activeUserId) ||
                (chat.user1_id === activeUserId || chat.user2_id === activeUserId)) {
                conversations.push({ ...chat, id: chatKey });
            }
        });

        conversations.sort((a, b) => (b.last_message_time || 0) - (a.last_message_time || 0));

        const convoDiv = document.getElementById('conversations-list');
        if (conversations.length === 0) {
            convoDiv.innerHTML = '<p class="text-muted">No conversations yet</p>';
            updateNotificationBadge();
            return;
        }

        let unreadCount = 0;
        const conversationItems = await Promise.all(conversations.map(async conv => {
            const isActive = conv.id === currentChatId;
            const otherUserId = getOtherUserId(conv);
            const activeUserId = getCurrentUserId();
            const displayName = await getChatDisplayName(conv);
            const initial = (displayName.charAt(0) || 'N').toUpperCase();
            const preview = conv.last_message || 'Discuss price and note content here';
            const previewTime = conv.last_message_time ? new Date(conv.last_message_time).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';
            const hasUnreadCount = Number(conv.unread_count || 0) > 0;
            const fromOtherUser = Boolean(conv.last_message_sender_id && conv.last_message_sender_id !== activeUserId);
            const isUnread = !isActive && (hasUnreadCount || fromOtherUser);
            if (isUnread) unreadCount += Number(conv.unread_count || 1) || 1;

            return `
                <div class="conversation-item ${isActive ? 'active' : ''} ${isUnread ? 'unread' : ''}" onclick="selectConversation('${conv.id}')">
                    <div class="conversation-avatar">${initial}</div>
                    <div class="conversation-meta">
                        <div class="d-flex justify-content-between align-items-center gap-2">
                            <strong class="conversation-name">${escapeHtml(displayName)}</strong>
                            <small class="text-muted">${previewTime}</small>
                        </div>
                        <div class="conversation-preview text-muted">${escapeHtml(preview)}</div>
                        <div class="conversation-status ${isUnread ? 'unread' : 'opened'}">
                            <span class="status-dot"></span>
                            <span>${isUnread ? 'Unread' : 'Opened'}</span>
                        </div>
                    </div>
                </div>
            `;
        }));

        convoDiv.innerHTML = conversationItems.join('');
        updateNotificationBadge(unreadCount);
    });
}

function selectConversation(chatId) {
    currentChatId = chatId;
    if (currentChatId) {
        firebase.database().ref('chats/' + currentChatId).update({ unread_count: 0, last_opened_at: Date.now() });
    }
    window.location.href = 'messages.html?chat_id=' + chatId;
}

function updateNotificationBadge(count = 0) {
    const badge = document.getElementById('nav-notification-badge');
    if (!badge) return;
    const total = Number(count || 0);
    badge.textContent = total;
    badge.style.display = total > 0 ? 'inline-flex' : 'none';
}

function viewNoteAd() {
    if (!currentChatData?.note_id) {
        alert('No note ad linked to this chat.');
        return;
    }
    window.location.href = 'buy-notes.html?note_id=' + encodeURIComponent(currentChatData.note_id);
}

async function deleteCurrentChat() {
    if (!currentChatId) {
        alert('Please select a chat first.');
        return;
    }

    const confirmed = confirm('Delete this entire chat thread?');
    if (!confirmed) return;

    try {
        const chatRef = firebase.database().ref('chats/' + currentChatId);
        const messagesRef = firebase.database().ref('messages');
        const messagesSnap = await messagesRef.orderByChild('chat_id').equalTo(currentChatId).once('value');

        const updates = {};
        messagesSnap.forEach(child => {
            updates[child.key] = null;
        });

        await Promise.all([
            chatRef.remove(),
            Object.keys(updates).length ? messagesRef.update(updates) : Promise.resolve()
        ]);

        currentChatId = '';
        currentChatData = null;
        document.getElementById('chat-header').textContent = 'Select a chat';
        document.getElementById('chat-subtitle').textContent = 'Negotiate price and note content';
        document.getElementById('messages-container').innerHTML = '<div class="chat-empty-state"><p class="text-muted">This chat was deleted.</p></div>';
        document.getElementById('chat-note-card').innerHTML = '';
        document.getElementById('quick-actions').innerHTML = '';
        document.getElementById('message-input').value = '';
        loadConversations();
    } catch (error) {
        console.error('Error deleting chat:', error);
        alert('Failed to delete chat. Please try again.');
    }
}

function renderQuickActions(chat) {
    const quickReplies = [
        { label: 'Price?', text: 'Is the price negotiable for this note?' },
        { label: 'More content', text: 'Can you share more of the content or pages for this note?' },
        { label: 'Full note', text: 'Please send the full note content before I decide.' },
        { label: 'Discuss price', text: 'I would like to discuss the price for this note.' }
    ];

    const container = document.getElementById('quick-actions');
    container.innerHTML = quickReplies.map(reply => `
        <button type="button" class="btn btn-outline-primary btn-sm" onclick="useQuickReply('${reply.text.replace(/'/g, "\\'")}')">${reply.label}</button>
    `).join('');
}

function useQuickReply(text) {
    const input = document.getElementById('message-input');
    input.value = text;
    input.focus();
}

async function loadMessages(chatId) {
    const chatSnapshot = await firebase.database().ref('chats/' + chatId).once('value');
    const chat = chatSnapshot.val();
    if (!chat) {
        alert('Chat not found');
        return;
    }

    currentChatData = chat;
    const header = document.getElementById('chat-header');
    const subtitle = document.getElementById('chat-subtitle');
    const avatar = document.getElementById('chat-avatar');
    const noteCard = document.getElementById('chat-note-card');

    const noteTitle = chat.note_title || chat.subject || 'Note discussion';
    const notePrice = chat.note_price || 0;
    const noteDescription = chat.note_description || 'Discuss the note content and negotiate the price here.';
    const displayName = await getChatDisplayName(chat);

    header.textContent = `${displayName}`;
    subtitle.textContent = chat.note_title ? `${displayName} • ${noteTitle} • ₹${notePrice}` : `Chat with ${displayName}`;
    avatar.textContent = (displayName.charAt(0) || 'N').toUpperCase();
    noteCard.innerHTML = `
        <div class="chat-note-card">
            <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                    <h6 class="mb-1">${escapeHtml(noteTitle)}</h6>
                    <p class="mb-0 text-muted">${escapeHtml(noteDescription)}</p>
                </div>
                <span class="badge bg-success">₹${notePrice}</span>
            </div>
        </div>
    `;
    renderQuickActions(chat);

    await markMessagesAsViewed(chatId);

    const messagesSnapshot = await firebase.database().ref('messages').orderByChild('chat_id').equalTo(chatId).once('value');
    const container = document.getElementById('messages-container');
    const messages = [];

    messagesSnapshot.forEach(childSnapshot => {
        messages.push(childSnapshot.val());
    });

    messages.sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));

    if (messages.length === 0) {
        container.innerHTML = '<div class="chat-empty-state"><p class="text-muted">No messages yet. Start the conversation about the price or note content.</p></div>';
        return;
    }

    let html = '';
    messages.forEach(msg => {
        const isSender = msg.sender_id === userId;
        const timestamp = new Date(msg.timestamp).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        const text = escapeHtml(msg.text || '').split('\n').join('<br>');
        const isViewed = Boolean(msg.viewed);
        const statusIcon = isSender ? `<span class="message-status"><span class="tick ${isViewed ? 'read' : 'pending'}">✓✓</span></span>` : '';
        html += `
            <div class="chat-message ${isSender ? 'text-end' : 'text-start'}">
                <div class="chat-bubble ${isSender ? 'sent' : 'received'}">
                    <div>${text}</div>
                    <small>${timestamp}${statusIcon}</small>
                </div>
            </div>
        `;
    });
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

document.getElementById('message-form').addEventListener('submit', function(e) {
    e.preventDefault();
    sendMessage();
});

function sendMessage() {
    if (!currentChatId) {
        alert('Please select a conversation first');
        return;
    }

    const messageText = document.getElementById('message-input').value.trim();
    if (!messageText) {
        return;
    }

    firebase.database().ref('messages').push({
        chat_id: currentChatId,
        sender_id: userId,
        sender_name: userName,
        text: messageText,
        timestamp: Date.now(),
        viewed: false
    }).then(() => {
        document.getElementById('message-input').value = '';
        firebase.database().ref('chats/' + currentChatId).update({
            last_message: messageText,
            last_message_time: Date.now(),
            last_message_sender_id: userId
        });

        loadMessages(currentChatId);
        loadConversations();
    }).catch(error => {
        alert('Error sending message: ' + error.message);
    });
}
</script>
<div id="app-footer"></div>
</body>
</html>
